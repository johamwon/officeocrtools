[server]
host = 0.0.0.0
port = 8000

[llm]
# LLM API地址（llama-server启动后的地址）
base_url = http://localhost:8080/v1
api_key = not-needed
model = MiniCPM-V-4_6
# 模型最大context长度
context_size = 8196

# llama-server 启动命令（留空则不自动启动，需手动启动）
# 支持变量: {base_dir} = 应用根目录, {models_dir} = 模型目录
# 示例1: llama-server -m {models_dir}/qwen2.5-coder-1.5b-instruct-q8_0.gguf -c 4096 --port 8080
# 示例2: llama-server -m {models_dir}/MiniCPM-V-4_6-Q4_K_M.gguf -c 8196 --mmproj {models_dir}/mmproj-model-f16.gguf --port 8080
launch_command = llama-server -m {models_dir}/MiniCPM-V-4_6-Q4_K_M.gguf -c 8196 --mmproj {models_dir}/mmproj-model-f16.gguf --port 8080
# LLM服务端口（用于健康检查）
port = 8080

[notify]
enabled = true
dingtalk_webhook = https://oapi.dingtalk.com/robot/send?access_token=f9612510b343e6d8bffc60b2a0d7168593b1bb93e55a75a1a1e0dd2c80555c40
dingtalk_secret =
check_hour = 9
check_minute = 0
